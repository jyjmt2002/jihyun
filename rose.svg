<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- PIXEL ART DOUBLE ROSES (32x32 size, 1px pixel grid) -->
  
  <!-- LEAF OUTLINES (Black/Dark wood) -->
  <g fill="#121212">
    <!-- Top Left Leaf Outline -->
    <rect x="4" y="2" width="4" height="1" />
    <rect x="3" y="3" width="1" height="3" />
    <rect x="8" y="3" width="1" height="2" />
    <rect x="9" y="5" width="1" height="2" />
    <rect x="4" y="6" width="5" height="1" />
    
    <!-- Bottom Left Leaf Outline -->
    <rect x="11" y="24" width="4" height="1" />
    <rect x="10" y="25" width="1" height="2" />
    <rect x="15" y="25" width="1" height="2" />
    <rect x="11" y="27" width="4" height="1" />
    
    <!-- Right Leaf Outline -->
    <rect x="27" y="13" width="3" height="1" />
    <rect x="26" y="14" width="1" height="3" />
    <rect x="30" y="14" width="1" height="3" />
    <rect x="27" y="17" width="3" height="1" />
    <rect x="28" y="18" width="1" height="1" />
  </g>

  <!-- LEAF FILLS (Greens) -->
  <!-- Main Leaf Green -->
  <g fill="#7ec850">
    <!-- Top Left Leaf Fill -->
    <rect x="4" y="3" width="4" height="3" />
    <!-- Bottom Left Leaf Fill -->
    <rect x="11" y="25" width="4" height="2" />
    <!-- Right Leaf Fill -->
    <rect x="27" y="14" width="3" height="3" />
  </g>
  <!-- Dark Leaf Green Shadows & Veins -->
  <g fill="#4e9026">
    <!-- Top Left Leaf Vein -->
    <rect x="5" y="4" width="2" height="1" />
    <rect x="6" y="5" width="2" height="1" />
    <!-- Bottom Left Leaf Shadow -->
    <rect x="12" y="26" width="2" height="1" />
    <!-- Right Leaf Vein -->
    <rect x="28" y="15" width="1" height="2" />
    <rect x="29" y="16" width="1" height="1" />
  </g>

  <!-- FLOWER OUTLINES & CONTRAST LINES (Black/Deep Charcoal) -->
  <g fill="#121212">
    <!-- Left Rose Outline (Major Blooming) -->
    <rect x="9" y="4" width="7" height="1" />
    <rect x="7" y="5" width="2" height="1" />
    <rect x="16" y="5" width="2" height="1" />
    <rect x="6" y="6" width="1" height="2" />
    <rect x="18" y="6" width="1" height="2" />
    <rect x="5" y="8" width="1" height="5" />
    <rect x="19" y="8" width="1" height="3" />
    <rect x="4" y="13" width="1" height="4" />
    <rect x="18" y="11" width="1" height="3" />
    
    <!-- Transition to bottom -->
    <rect x="5" y="17" width="1" height="3" />
    <rect x="6" y="20" width="2" height="1" />
    <rect x="8" y="21" width="2" height="1" />
    <rect x="10" y="22" width="2" height="1" />
    <rect x="12" y="23" width="7" height="1" />

    <!-- Right Rose Outline (Minor Blooming) -->
    <rect x="19" y="10" width="5" height="1" />
    <rect x="24" y="11" width="2" height="1" />
    <rect x="26" y="12" width="1" height="2" />
    <rect x="27" y="14" width="1" height="4" />
    <rect x="26" y="18" width="1" height="3" />
    <rect x="24" y="21" width="2" height="1" />
    <rect x="22" y="22" width="2" height="1" />
    <rect x="19" y="23" width="3" height="1" />
    
    <!-- Inner flower division outline -->
    <rect x="12" y="14" width="1" height="4" />
    <rect x="13" y="18" width="3" height="1" />
    <rect x="16" y="17" width="1" height="2" />
  </g>

  <!-- FLOWER DEEP ROSE SHADOWS (Deep Vibrant Rose-Pink) -->
  <g fill="#e31b5f">
    <!-- Left Rose Inner Shadows -->
    <rect x="10" y="12" width="5" height="2" />
    <rect x="9" y="14" width="3" height="3" />
    <rect x="12" y="15" width="4" height="2" />
    <rect x="6" y="16" width="4" height="2" />
    <rect x="10" y="19" width="3" height="2" />
    <rect x="14" y="20" width="4" height="2" />
    
    <!-- Right Rose Inner Shadows -->
    <rect x="19" y="16" width="4" height="2" />
    <rect x="17" y="18" width="3" height="3" />
    <rect x="20" y="21" width="3" height="1" />
  </g>

  <!-- FLOWER MID-PINK PETALS (Rich Blossom Pink) -->
  <g fill="#ff6ea0">
    <!-- Left Rose main petals -->
    <rect x="8" y="6" width="8" height="2" />
    <rect x="7" y="8" width="10" height="2" />
    <rect x="6" y="10" width="12" height="2" />
    <rect x="6" y="12" width="4" height="4" />
    <rect x="15" y="12" width="3" height="3" />
    <rect x="13" y="15" width="5" height="3" />
    <rect x="7" y="18" width="8" height="2" />
    <rect x="9" y="20" width="5" height="2" />
    
    <!-- Right Rose main petals -->
    <rect x="19" y="11" width="5" height="2" />
    <rect x="18" y="13" width="8" height="3" />
    <rect x="23" y="16" width="4" height="2" />
    <rect x="21" y="18" width="5" height="3" />
  </g>

  <!-- FLOWER LIGHT PINK HIGHLIGHTS (Creamy Rose Sparkle Blush) -->
  <g fill="#ffacd0">
    <!-- Left Rose Highlights -->
    <rect x="9" y="5" width="6" height="1" />
    <rect x="8" y="6" width="1" height="1" />
    <rect x="15" y="6" width="1" height="1" />
    <rect x="7" y="7" width="2" height="1" />
    <rect x="16" y="7" width="2" height="1" />
    <rect x="6" y="8" width="3" height="1" />
    <rect x="16" y="8" width="2" height="1" />
    <rect x="6" y="10" width="2" height="1" />
    <rect x="8" y="11" width="2" height="1" />
    <rect x="13" y="10" width="3" height="1" />
    <rect x="5" y="13" width="1" height="3" />
    <rect x="10" y="13" width="3" height="1" />
    <rect x="17" y="14" width="1" height="2" />
    <rect x="7" y="17" width="2" height="1" />
    <rect x="11" y="18" width="2" height="1" />
    <rect x="11" y="21" width="3" height="1" />
    
    <!-- Right Rose Highlights -->
    <rect x="20" y="11" width="4" height="1" />
    <rect x="19" y="12" width="2" height="1" />
    <rect x="24" y="12" width="2" height="1" />
    <rect x="25" y="13" width="2" height="1" />
    <rect x="21" y="14" width="3" height="1" />
    <rect x="26" y="15" width="1" height="3" />
    <rect x="25" y="18" width="1" height="1" />
    <rect x="23" y="20" width="2" height="1" />
  </g>

  <!-- FLOWER INTENSE BLUSH & BRIGHT PINK DETAILS (Soft Pink Glow) -->
  <g fill="#ffd0e5">
    <rect x="10" y="6" width="4" height="1" />
    <rect x="7" y="9" width="2" height="1" />
    <rect x="15" y="10" width="2" height="1" />
    <rect x="22" y="12" width="2" height="1" />
    <rect x="26" y="16" width="1" height="1" />
  </g>

  <!-- WHITE GLITTER CHIPS (Prismatic White Sparkle pixels) -->
  <g fill="#ffffff">
    <!-- Left Rose Sparkle Dots -->
    <rect x="11" y="7" width="1" height="1" />
    <rect x="13" y="9" width="1" height="1" />
    <rect x="7" y="11" width="1" height="1" />
    <rect x="16" y="11" width="1" height="1" />
    <rect x="8" y="14" width="1" height="1" />
    <rect x="11" y="16" width="1" height="1" />
    <rect x="15" y="16" width="1" height="1" />
    <rect x="12" y="19" width="1" height="1" />
    
    <!-- Right Rose Sparkle Dots -->
    <rect x="21" y="13" width="1" height="1" />
    <rect x="24" y="14" width="1" height="1" />
    <rect x="20" y="17" width="1" height="1" />
    <rect x="23" y="19" width="1" height="1" />
  </g>
</svg>
